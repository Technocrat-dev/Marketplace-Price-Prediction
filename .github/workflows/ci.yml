name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: pricescope-489206
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/pricescope-489206/pricescope-repo/api
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/pricescope-489206/pricescope-repo/frontend
  API_URL: https://pricescope-api-773627441383.us-central1.run.app

permissions:
  contents: read
  id-token: write

jobs:
  # ── Lint & Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check src/ scripts/ tests/ --select E,F,W --ignore E501,E402,W291,W293

      - name: Run unit tests (skip MongoDB-dependent tests)
        run: |
          python -m pytest tests/ -v --ignore=tests/test_db.py --tb=short -q

  # ── Deploy to Cloud Run (only on push to main) ──────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/773627441383/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@pricescope-489206.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Build & Push API ──────────────────────────────────
      - name: Build & push API image
        run: |
          gcloud builds submit \
            --tag ${{ env.API_IMAGE }}:${{ github.sha }} \
            --timeout=1200 \
            .

      - name: Tag API image as latest
        run: |
          gcloud artifacts docker tags add \
            ${{ env.API_IMAGE }}:${{ github.sha }} \
            ${{ env.API_IMAGE }}:latest

      # ── Build & Push Frontend ─────────────────────────────
      - name: Build & push Frontend image
        run: |
          gcloud builds submit \
            --config=frontend/cloudbuild.yaml \
            ./frontend

      # ── Deploy API to Cloud Run ───────────────────────────
      - name: Deploy API
        run: |
          gcloud run deploy pricescope-api \
            --image ${{ env.API_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 2 \
            --cpu-boost \
            --allow-unauthenticated \
            --quiet

      # ── Deploy Frontend to Cloud Run ──────────────────────
      - name: Deploy Frontend
        run: |
          gcloud run deploy pricescope-frontend \
            --image ${{ env.FRONTEND_IMAGE }}:latest \
            --region ${{ env.REGION }} \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --allow-unauthenticated \
            --quiet

      - name: Output deployment URLs
        run: |
          echo "✅ Deployment complete!"
          echo "API: $(gcloud run services describe pricescope-api --region ${{ env.REGION }} --format 'value(status.url)')"
          echo "Frontend: $(gcloud run services describe pricescope-frontend --region ${{ env.REGION }} --format 'value(status.url)')"
